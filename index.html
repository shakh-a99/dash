<title>Dashboard</title>
<style>
:root { --bg:#101319; --card:#191e27; --fg:#e8eaef; --muted:#8b93a3;
  --acc:#6b93ff; --bad:#e06c6c; --line:#272d3a; }
@media (prefers-color-scheme: light) { :root { --bg:#f6f7f9; --card:#fff;
  --fg:#1a202c; --muted:#7b8494; --line:#e6e8ee; } }
body { margin:0; background:var(--bg); color:var(--fg); font:16px/1.5
  -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  display:flex; min-height:100vh; align-items:center; justify-content:center; }
.box { background:var(--card); border:1px solid var(--line); border-radius:16px;
  padding:28px; width:min(92vw,380px); }
h1 { font-size:18px; margin:0 0 14px; }
input[type=password] { width:100%; box-sizing:border-box; font-size:16px;
  padding:12px; border-radius:10px; border:1px solid var(--line);
  background:var(--bg); color:var(--fg); margin-bottom:12px; }
button { width:100%; padding:12px; font-size:16px; border:0; border-radius:10px;
  background:var(--acc); color:#fff; font-weight:600; cursor:pointer; }
label { display:flex; gap:8px; align-items:center; color:var(--muted);
  font-size:14px; margin:10px 0 14px; }
#err { color:var(--bad); font-size:14px; min-height:20px; margin-top:10px; }
.meta { color:var(--muted); font-size:12.5px; margin-top:8px; }
</style></head><body>

async function unlock(pass) {
  const enc = new TextEncoder();
  const base = await crypto.subtle.importKey("raw", enc.encode(pass),
    "PBKDF2", false, ["deriveBits"]);
  const bits = new Uint8Array(await crypto.subtle.deriveBits(

    {name:"HMAC", hash:"SHA-256"}, false, ["verify"]);

    throw new Error("bad-pass");

    "AES-CBC", false, ["decrypt"]);

    {name:"AES-CBC", iv:bits.slice(32, 48)}, aKey, ct);
